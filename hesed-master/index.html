<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Coming Soon - LFC Goodness Ojoo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="icon" type="image/jpeg" href="https://living-faith-church-goodness-ojoo-i.vercel.app/images/lfc-logo.jpg">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #cc0000; /* Winners Red */
            background-image: linear-gradient(135deg, #cc0000 0%, #8a0000 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            color: #ffffff;
            text-align: center;
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #ffffff;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p.subtitle {
            font-size: 1.5rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        .countdown {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }
        .time-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 10px;
            min-width: 90px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .number {
            font-size: 4rem;
            font-weight: bold;
            display: block;
            line-height: 1;
        }
        .label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            display: block;
        }
        .developer-credit {
            position: absolute;
            bottom: 20px;
            font-size: 1rem;
        }
        .developer-credit a {
            color: #ffffff;
            text-decoration: underline;
            font-weight: bold;
        }
        
        /* Mobile responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            p.subtitle { font-size: 1.2rem; }
            .countdown { gap: 10px; }
            .time-box { min-width: 60px; padding: 15px; }
            .number { font-size: 2.5rem; }
            .label { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <img src="https://living-faith-church-goodness-ojoo-i.vercel.app/images/lfc-logo.jpg" alt="LFC Logo" class="logo">
    
    <h1>Are You Ready?</h1>
    <p class="subtitle">Our new digital home launches this Sunday!</p>

    <div class="countdown">
        <div class="time-box"><span class="number" id="days">00</span><span class="label">Days</span></div>
        <div class="time-box"><span class="number" id="hours">00</span><span class="label">Hours</span></div>
        <div class="time-box"><span class="number" id="mins">00</span><span class="label">Mins</span></div>
        <div class="time-box"><span class="number" id="secs">00</span><span class="label">Secs</span></div>
    </div>

    <div class="developer-credit">
        Developed by: <a href="https://victor-portfolio-weld.vercel.app/" target="_blank">Victor</a>
    </div>

    <script>
        // Set the launch date to Sunday, April 26, 2026 at 7:30 AM
        const launchDate = new Date("April 26, 2026 07:30:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            // Math for days, hours, minutes, and seconds
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Output the result
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("mins").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("secs").innerText = seconds < 10 ? "0" + seconds : seconds;

            // If the count down is over, redirect to the real website!
            if (distance < 0) {
                clearInterval(timer);
                // This automatically sends them to your real website
                window.location.href = "home.html"; 
            }
        }, 1000);
    </script>

</body>
</html>
